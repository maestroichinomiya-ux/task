<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスクボード - チーム共有タスク管理</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eceae4;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --radius: 8px;
    --radius-lg: 12px;
    --font: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #333333;
      --text-primary: #e8e8e8;
      --text-secondary: #a0a0a0;
      --text-tertiary: #707070;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; }
  button { font-family: var(--font); cursor: pointer; border: 0.5px solid var(--border-hover); background: transparent; color: var(--text-secondary); padding: 6px 14px; border-radius: var(--radius); font-size: 13px; transition: all 0.15s; }
  button:hover { background: var(--bg-tertiary); }
  button:active { transform: scale(0.98); }
  button.primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
  button.danger { color: #A32D2D; border-color: #F09595; }
  input, select, textarea { font-family: var(--font); font-size: 14px; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg-primary); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--border-hover); }
  textarea { resize: vertical; }

  .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
  .header-sub { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .header-sub p { font-size: 13px; color: var(--text-tertiary); }
  .sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; transition: background 0.3s; }
  .sync-info { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 5px; }

  .stats { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { border-radius: var(--radius); padding: 12px 14px; }
  .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
  .stat-card .value { font-size: 22px; font-weight: 500; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .toolbar input { width: 180px; font-size: 13px; }
  .toolbar select { font-size: 13px; min-width: 120px; }
  .view-toggle { margin-left: auto; display: flex; gap: 4px; }
  .view-btn { font-size: 12px; padding: 5px 14px; }
  .view-btn.active { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }

  .kanban { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; min-height: 400px; }
  .column { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 10px; display: flex; flex-direction: column; min-width: 0; transition: background 0.2s; }
  .column.drag-over { background: #E6F1FB; }
  .col-header { display: flex; align-items: center; gap: 8px; padding: 4px 4px 10px; margin-bottom: 10px; }
  .col-header .icon { font-size: 14px; opacity: 0.7; }
  .col-header .name { font-size: 13px; font-weight: 500; }
  .col-header .count { font-size: 11px; color: var(--text-tertiary); margin-left: auto; background: var(--bg-primary); border-radius: 99px; padding: 1px 8px; }
  .col-tasks { display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .task-card { background: var(--bg-primary); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 12px 14px; cursor: grab; transition: border-color 0.15s; }
  .task-card:hover { border-color: var(--border-hover); }
  .task-card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .task-card .title { font-size: 14px; font-weight: 500; line-height: 1.4; flex: 1; }
  .task-card .desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .task-card .bottom { display: flex; justify-content: space-between; align-items: center; }

  .priority { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; display: inline-block; }
  .priority.high { background: #FCEBEB; color: #A32D2D; border: 1px solid #F09595; }
  .priority.medium { background: #FAEEDA; color: #854F0B; border: 1px solid #FAC775; }
  .priority.low { background: #E1F5EE; color: #0F6E56; border: 1px solid #9FE1CB; }

  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 500; flex-shrink: 0; letter-spacing: -1px; }
  .avatar.empty { background: var(--bg-tertiary); border: 1px dashed var(--border-hover); color: var(--text-tertiary); }

  .deadline { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 3px; }
  .deadline.overdue { color: #A32D2D; font-weight: 500; }
  .overdue-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #E24B4A; }

  .list-sort { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .sort-btn { font-size: 12px; padding: 4px 12px; }
  .sort-btn.active { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
  .list-items { display: flex; flex-direction: column; gap: 4px; }
  .list-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg-primary); border-radius: var(--radius); border: 0.5px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
  .list-row:hover { border-color: var(--border-hover); }
  .list-row .status-icon { font-size: 13px; opacity: 0.6; width: 18px; text-align: center; flex-shrink: 0; }
  .list-row .title { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .members-section { margin-top: 24px; padding: 14px 16px; background: var(--bg-secondary); border-radius: var(--radius); }
  .members-section .section-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .members-grid { display: flex; gap: 16px; flex-wrap: wrap; }
  .member-item { display: flex; align-items: center; gap: 8px; cursor: pointer; transition: opacity 0.15s; }
  .member-item.faded { opacity: 0.4; }
  .member-name { font-size: 13px; font-weight: 500; }
  .member-count { font-size: 11px; color: var(--text-tertiary); }

  .info-bar { margin-top: 16px; padding: 10px 14px; background: var(--bg-secondary); border-radius: var(--radius); font-size: 12px; color: var(--text-tertiary); line-height: 1.6; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-tertiary); font-size: 14px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
  .modal { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 100%; max-width: 480px; max-height: 90vh; overflow: auto; padding: 1.5rem; }
  .modal h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 14px; }
  .form-group label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; justify-content: space-between; margin-top: 20px; gap: 8px; }
  .form-actions-right { display: flex; gap: 8px; }

  .loading { padding: 4rem 1rem; text-align: center; }
  .loading .msg { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .loading .sub { font-size: 12px; color: var(--text-tertiary); }

  .setup-screen { max-width: 540px; margin: 60px auto; padding: 2rem; background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); }
  .setup-screen h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .setup-screen .subtitle { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; }
  .setup-screen .step { margin-bottom: 12px; padding: 12px 14px; background: var(--bg-secondary); border-radius: var(--radius); }
  .setup-screen .step-num { font-size: 11px; font-weight: 500; color: #378ADD; margin-bottom: 3px; }
  .setup-screen .step-text { font-size: 13px; line-height: 1.6; color: var(--text-primary); }
  .setup-error { margin-top: 8px; font-size: 12px; color: #A32D2D; display: none; }

  .member-edit-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .member-edit-row input { flex: 1; font-size: 14px; }

  .avatar-stack { display: flex; flex-shrink: 0; }
  .avatar-stack .avatar { margin-left: -6px; border: 2px solid var(--bg-primary); }
  .avatar-stack .avatar:first-child { margin-left: 0; }

  .assignee-grid { display: flex; flex-direction: column; gap: 6px; }
  .assignee-option { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.1s; user-select: none; }
  .assignee-option:hover { background: var(--bg-secondary); }
  .assignee-option.selected { background: var(--bg-tertiary); }
  .assignee-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border-hover); display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; flex-shrink: 0; transition: all 0.15s; }
  .assignee-option.selected .assignee-check { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }

  @media (max-width: 768px) {
    .kanban { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY = 'taskboard-firebase-config';
let db = null;
function loadConfig() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } }
function saveConfig(cfg) { localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); }

const MEMBER_COLORS = ["#1D9E75","#378ADD","#D85A30","#D4537E","#7F77DD","#BA7517","#639922","#A32D2D","#534AB7","#888780"];
const DEFAULT_MEMBERS = [
  { id: "m1", name: "メンバー1", color: "#1D9E75" },
  { id: "m2", name: "メンバー2", color: "#378ADD" },
  { id: "m3", name: "メンバー3", color: "#D85A30" },
  { id: "m4", name: "メンバー4", color: "#D4537E" },
  { id: "m5", name: "メンバー5", color: "#7F77DD" },
];
function getInitial(name) { return name ? name.charAt(0) : '?'; }

// Backward-compatible: old tasks have assignee (string), new tasks have assignees (array)
function getAssignees(task) {
  if(task.assignees && Array.isArray(task.assignees)) return task.assignees.filter(Boolean);
  if(task.assignee) return [task.assignee];
  return [];
}
function taskHasAssignee(task, memberId) {
  return getAssignees(task).includes(memberId);
}

const PRIORITY_MAP = { high:{label:"高",cls:"high"}, medium:{label:"中",cls:"medium"}, low:{label:"低",cls:"low"} };
const COLUMNS = [
  { id:"todo", label:"未着手", icon:"○", accent:"#B4B2A9" },
  { id:"in_progress", label:"進行中", icon:"◐", accent:"#378ADD" },
  { id:"review", label:"レビュー", icon:"◉", accent:"#BA7517" },
  { id:"done", label:"完了", icon:"●", accent:"#1D9E75" },
];
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const formatDate = d => { if(!d)return""; const dt=new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
const isOverdue = d => d ? new Date(d)<new Date(new Date().toDateString()) : false;

function sampleTasks(members) {
  const m=members||DEFAULT_MEMBERS;
  return [
    {id:uid(),title:"Q2レポート作成",desc:"四半期レポートのドラフトを作成する",status:"todo",priority:"high",assignee:m[0]?.id||"",deadline:"2026-03-28",created:Date.now()},
    {id:uid(),title:"デザインレビュー",desc:"新UIのモックアップを確認",status:"in_progress",priority:"medium",assignee:m[1]?.id||"",deadline:"2026-03-25",created:Date.now()},
    {id:uid(),title:"API仕様書更新",desc:"v2エンドポイントの仕様を追記",status:"review",priority:"medium",assignee:m[2]?.id||"",deadline:"2026-03-24",created:Date.now()},
    {id:uid(),title:"テスト環境構築",desc:"CI/CDパイプラインの設定",status:"done",priority:"low",assignee:m[3]?.id||"",deadline:"2026-03-20",created:Date.now()},
    {id:uid(),title:"クライアント打ち合わせ準備",desc:"提案資料とアジェンダの作成",status:"todo",priority:"high",assignee:m[4]?.id||"",deadline:"2026-03-26",created:Date.now()},
  ];
}

const DONE_HIDE_DAYS = 3;
function isDoneHidden(task) {
  if(task.status!=='done') return false;
  if(!task.completedAt) return false;
  return (Date.now() - task.completedAt) > DONE_HIDE_DAYS * 24*60*60*1000;
}

let state = {tasks:[],members:DEFAULT_MEMBERS,view:'kanban',filterMember:'',search:'',sortBy:'status',showDone:true,modal:null,syncing:false,lastSync:null,loading:true,screen:'loading'};
function setState(patch) { Object.assign(state,patch); render(); }

function initFirebase(config) {
  try {
    if(!firebase.apps.length) firebase.initializeApp(config);
    db = firebase.database();
    db.ref('members').on('value', snap => {
      const data = snap.val();
      if(data) { setState({members:Object.values(data)}); }
      else { const obj={}; DEFAULT_MEMBERS.forEach(m=>obj[m.id]=m); db.ref('members').set(obj); }
    });
    db.ref('tasks').on('value', snap => {
      const data = snap.val();
      if(data) { setState({tasks:Object.values(data),loading:false,screen:'app',lastSync:Date.now(),syncing:false}); }
      else { const s=sampleTasks(state.members); const obj={}; s.forEach(t=>obj[t.id]=t); db.ref('tasks').set(obj); setState({tasks:s,loading:false,screen:'app',lastSync:Date.now()}); }
    });
    return true;
  } catch(e) { console.error('Firebase error:',e); return false; }
}
function saveTasks(tasks) { if(db){const obj={};tasks.forEach(t=>obj[t.id]=t);db.ref('tasks').set(obj);} }
function saveMembers(members) { if(db){const obj={};members.forEach(m=>obj[m.id]=m);db.ref('members').set(obj);} }

function h(tag,attrs,...children) {
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()){if(c==null||c===false)continue;el.appendChild(typeof c==='string'?document.createTextNode(c):c);}
  return el;
}

function avatarEl(member,size=28) {
  if(!member) return h('div',{className:'avatar empty',style:{width:size+'px',height:size+'px',fontSize:(size*0.4)+'px'}},'?');
  return h('div',{className:'avatar',style:{width:size+'px',height:size+'px',fontSize:(size*0.42)+'px',background:member.color}},getInitial(member.name));
}
function priorityEl(p){const i=PRIORITY_MAP[p];return i?h('span',{className:`priority ${i.cls}`},i.label):document.createTextNode('');}
function deadlineEl(d,s){if(!d)return document.createTextNode('');const over=isOverdue(d)&&s!=='done';const el=h('span',{className:`deadline ${over?'overdue':''}`});if(over)el.appendChild(h('span',{className:'overdue-dot'}));el.appendChild(document.createTextNode(formatDate(d)));return el;}

function avatarStackEl(task, size=24) {
  const ids = getAssignees(task);
  if(ids.length===0) return avatarEl(null, size);
  if(ids.length===1) { const m=state.members.find(mm=>mm.id===ids[0]); return avatarEl(m, size); }
  const stack = h('div',{className:'avatar-stack'});
  ids.forEach(id => { const m=state.members.find(mm=>mm.id===id); stack.appendChild(avatarEl(m, size)); });
  return stack;
}

function renderTaskCard(task){
  const card=h('div',{className:'task-card',draggable:'true',onClick:()=>setState({modal:{mode:'edit',task}})},
    h('div',{className:'top'},h('span',{className:'title'},task.title),priorityEl(task.priority)),
    task.desc?h('div',{className:'desc'},task.desc):null,
    h('div',{className:'bottom'},avatarStackEl(task,24),deadlineEl(task.deadline,task.status))
  );
  card.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',task.id));
  return card;
}

function renderKanban(tasks){
  const grid=h('div',{className:'kanban'});
  COLUMNS.forEach(col=>{
    const colTasks=tasks.filter(t=>t.status===col.id).sort((a,b)=>({high:0,medium:1,low:2})[a.priority]-({high:0,medium:1,low:2})[b.priority]);
    const colEl=h('div',{className:'column'});
    colEl.appendChild(h('div',{className:'col-header',style:{borderBottom:`2px solid ${col.accent}`}},h('span',{className:'icon'},col.icon),h('span',{className:'name'},col.label),h('span',{className:'count'},String(colTasks.length))));
    const tc=h('div',{className:'col-tasks'});colTasks.forEach(t=>tc.appendChild(renderTaskCard(t)));colEl.appendChild(tc);
    colEl.addEventListener('dragover',e=>{e.preventDefault();colEl.classList.add('drag-over');});
    colEl.addEventListener('dragleave',()=>colEl.classList.remove('drag-over'));
    colEl.addEventListener('drop',e=>{e.preventDefault();colEl.classList.remove('drag-over');const tid=e.dataTransfer.getData('text/plain');saveTasks(state.tasks.map(t=>{if(t.id!==tid)return t;const upd={...t,status:col.id};if(col.id==='done'&&t.status!=='done')upd.completedAt=Date.now();if(col.id!=='done')delete upd.completedAt;return upd;}));});
    grid.appendChild(colEl);
  });
  return grid;
}

function renderList(tasks){
  const container=h('div');
  const sortBar=h('div',{className:'list-sort'});
  [['status','ステータス順'],['priority','優先度順'],['deadline','期限順'],['assignee','担当者順']].forEach(([k,l])=>{
    sortBar.appendChild(h('button',{className:`sort-btn ${state.sortBy===k?'active':''}`,onClick:()=>setState({sortBy:k})},l));
  });
  container.appendChild(sortBar);
  const sorted=[...tasks].sort((a,b)=>{
    if(state.sortBy==='priority')return({high:0,medium:1,low:2})[a.priority]-({high:0,medium:1,low:2})[b.priority];
    if(state.sortBy==='deadline'){if(!a.deadline)return 1;if(!b.deadline)return -1;return new Date(a.deadline)-new Date(b.deadline);}
    if(state.sortBy==='assignee')return(state.members.find(m=>m.id===getAssignees(a)[0])?.name||'ん').localeCompare(state.members.find(m=>m.id===getAssignees(b)[0])?.name||'ん','ja');
    return({todo:0,in_progress:1,review:2,done:3})[a.status]-({todo:0,in_progress:1,review:2,done:3})[b.status];
  });
  const items=h('div',{className:'list-items'});
  sorted.forEach(task=>{
    const col=COLUMNS.find(c=>c.id===task.status);
    items.appendChild(h('div',{className:'list-row',onClick:()=>setState({modal:{mode:'edit',task}})},
      h('span',{className:'status-icon'},col?.icon||''),h('span',{className:'title'},task.title),
      priorityEl(task.priority),deadlineEl(task.deadline,task.status),avatarStackEl(task,24)));
  });
  container.appendChild(items);return container;
}

function renderModal(){
  if(!state.modal)return null;
  if(state.modal.mode==='members')return renderMemberModal();

  const isEdit=state.modal.mode==='edit';
  const task=isEdit?state.modal.task:{title:'',desc:'',status:'todo',priority:'medium',assignees:[],deadline:''};
  const currentAssignees = getAssignees(task);
  const overlay=h('div',{className:'modal-overlay',onClick:()=>setState({modal:null})});
  const modal=h('div',{className:'modal',onClick:e=>e.stopPropagation()});
  modal.appendChild(h('h2',null,isEdit?'タスク編集':'新規タスク'));

  const titleInput=h('input',{value:task.title,placeholder:'タスク名を入力...'});
  const descInput=h('textarea',{rows:'3',placeholder:'詳細を入力...'});descInput.value=task.desc||'';
  const statusSel=h('select');COLUMNS.forEach(c=>{const o=h('option',{value:c.id},`${c.icon} ${c.label}`);if(c.id===task.status)o.selected=true;statusSel.appendChild(o);});
  const prioSel=h('select');Object.entries(PRIORITY_MAP).forEach(([k,v])=>{const o=h('option',{value:k},v.label);if(k===task.priority)o.selected=true;prioSel.appendChild(o);});
  const deadInput=h('input',{type:'date',value:task.deadline||''});

  // Multi-select assignees
  const selectedAssignees = new Set(currentAssignees);
  const assigneeContainer = h('div',{className:'assignee-grid'});
  state.members.forEach(m => {
    const isSelected = selectedAssignees.has(m.id);
    const option = h('div',{className:`assignee-option ${isSelected?'selected':''}`,onClick:()=>{
      if(selectedAssignees.has(m.id)) selectedAssignees.delete(m.id);
      else selectedAssignees.add(m.id);
      option.classList.toggle('selected');
      option.querySelector('.assignee-check').textContent = selectedAssignees.has(m.id) ? '✓' : '';
    }},
      h('div',{className:'assignee-check'},isSelected?'✓':''),
      avatarEl(m,24),
      h('span',{style:{fontSize:'13px'}},m.name)
    );
    assigneeContainer.appendChild(option);
  });

  modal.appendChild(h('div',{className:'form-group'},h('label',null,'タイトル'),titleInput));
  modal.appendChild(h('div',{className:'form-group'},h('label',null,'説明'),descInput));
  modal.appendChild(h('div',{className:'form-row'},h('div',{className:'form-group'},h('label',null,'ステータス'),statusSel),h('div',{className:'form-group'},h('label',null,'優先度'),prioSel)));
  modal.appendChild(h('div',{className:'form-row'},h('div',{className:'form-group'},h('label',null,'担当者（複数選択可）'),assigneeContainer),h('div',{className:'form-group'},h('label',null,'期限'),deadInput)));

  const actions=h('div',{className:'form-actions'});
  const left=h('div');
  if(isEdit)left.appendChild(h('button',{className:'danger',onClick:()=>{saveTasks(state.tasks.filter(t=>t.id!==task.id));setState({modal:null});}},'削除'));
  actions.appendChild(left);
  const right=h('div',{className:'form-actions-right'});
  right.appendChild(h('button',{onClick:()=>setState({modal:null})},'キャンセル'));
  right.appendChild(h('button',{className:'primary',onClick:()=>{
    if(!titleInput.value.trim())return;
    const form={title:titleInput.value.trim(),desc:descInput.value,status:statusSel.value,priority:prioSel.value,assignees:Array.from(selectedAssignees),deadline:deadInput.value};
    // Remove old single assignee field
    if(form.status==='done'&&(!isEdit||task.status!=='done'))form.completedAt=Date.now();
    if(form.status!=='done')form.completedAt=null;
    const newTasks=isEdit?state.tasks.map(t=>t.id===task.id?{...t,...form,assignee:null}:t):[...state.tasks,{...form,id:uid(),created:Date.now()}];
    saveTasks(newTasks);setState({modal:null});
  }},'保存'));
  actions.appendChild(right);modal.appendChild(actions);overlay.appendChild(modal);
  setTimeout(()=>titleInput.focus(),50);return overlay;
}

function renderMemberModal(){
  const overlay=h('div',{className:'modal-overlay',onClick:()=>setState({modal:null})});
  const modal=h('div',{className:'modal',onClick:e=>e.stopPropagation()});
  modal.appendChild(h('h2',null,'メンバー管理'));
  modal.appendChild(h('p',{style:{fontSize:'13px',color:'var(--text-secondary)',marginBottom:'16px'}},'名前を変更すると、チーム全員の画面に即座に反映されます。'));

  const inputRefs=[];
  state.members.forEach((m,idx)=>{
    const row=h('div',{className:'member-edit-row'});
    row.appendChild(avatarEl(m,32));
    const nameInput=h('input',{value:m.name,placeholder:`メンバー${idx+1}の名前`});
    inputRefs.push({id:m.id,input:nameInput,color:m.color});
    row.appendChild(nameInput);
    if(state.members.length>1){
      row.appendChild(h('button',{className:'danger',style:{padding:'4px 10px',fontSize:'12px',flexShrink:'0'},onClick:()=>{
        const newM=state.members.filter(mm=>mm.id!==m.id);saveMembers(newM);
        // Re-open modal after delete
        setTimeout(()=>setState({modal:{mode:'members'}}),100);
      }},'×'));
    }
    modal.appendChild(row);
  });

  if(state.members.length<10){
    modal.appendChild(h('button',{style:{width:'100%',marginTop:'4px',marginBottom:'8px'},onClick:()=>{
      const newId='m'+uid();
      const ci=state.members.length%MEMBER_COLORS.length;
      const newM=[...state.members,{id:newId,name:'',color:MEMBER_COLORS[ci]}];
      saveMembers(newM);
      setTimeout(()=>setState({modal:{mode:'members'}}),100);
    }},'+ メンバーを追加'));
  }

  const actions=h('div',{className:'form-actions'});
  actions.appendChild(h('div'));
  const right=h('div',{className:'form-actions-right'});
  right.appendChild(h('button',{onClick:()=>setState({modal:null})},'キャンセル'));
  right.appendChild(h('button',{className:'primary',onClick:()=>{
    const newM=inputRefs.map(r=>({id:r.id,name:r.input.value.trim()||'名前なし',color:r.color}));
    saveMembers(newM);setState({modal:null});
  }},'保存'));
  actions.appendChild(right);modal.appendChild(actions);overlay.appendChild(modal);return overlay;
}

function renderSetup(){
  const el=h('div',{className:'setup-screen'});
  el.appendChild(h('h1',null,'タスクボード セットアップ'));
  el.appendChild(h('p',{className:'subtitle'},'チーム全員がリアルタイムでタスクを共有するために、Firebase Realtime Database の設定が必要です。無料で使えます。'));
  [{num:'1',text:'Firebase Console（console.firebase.google.com）でプロジェクトを作成'},{num:'2',text:'左メニュー「Database と Storage」→「Realtime Database」→「データベースを作成」→「テストモードで開始」'},{num:'3',text:'プロジェクトの設定 →「マイアプリ」→ ウェブアプリを追加 → firebaseConfig をコピー'},{num:'4',text:'コピーした設定に databaseURL を追加して下にペースト'}].forEach(s=>el.appendChild(h('div',{className:'step'},h('div',{className:'step-num'},`Step ${s.num}`),h('div',{className:'step-text'},s.text))));
  const configInput=h('textarea',{rows:'7',placeholder:'{\n  "apiKey": "AIza...",\n  "authDomain": "your-project.firebaseapp.com",\n  "databaseURL": "https://your-project-default-rtdb.firebaseio.com",\n  "projectId": "your-project"\n}',style:{width:'100%',fontFamily:'monospace',fontSize:'12px',marginTop:'8px'}});
  el.appendChild(h('div',{className:'form-group',style:{marginTop:'20px'}},h('label',null,'Firebase 設定 JSON'),configInput));
  const errorMsg=h('div',{className:'setup-error'},'');
  el.appendChild(errorMsg);
  el.appendChild(h('button',{className:'primary',style:{width:'100%',padding:'10px',marginTop:'8px',fontSize:'14px'},onClick:()=>{
    errorMsg.style.display='none';let cfg;
    try{cfg=JSON.parse(configInput.value);}catch{errorMsg.textContent='JSONの形式が正しくありません。';errorMsg.style.display='block';return;}
    if(!cfg.databaseURL){errorMsg.textContent='databaseURL が含まれていません。Realtime Databaseの画面でURLを確認してください。';errorMsg.style.display='block';return;}
    saveConfig(cfg);setState({screen:'loading'});
    loadFirebaseSDK(()=>{if(!initFirebase(cfg)){errorMsg.textContent='接続に失敗しました。設定を確認してください。';errorMsg.style.display='block';setState({screen:'setup'});}});
  }},'接続して開始'));
  el.appendChild(h('p',{style:{fontSize:'11px',color:'var(--text-tertiary)',marginTop:'16px',lineHeight:'1.6'}},'この設定はブラウザに保存されます。チームメンバーには、このページのURLと同じFirebase設定JSONを共有してください。'));
  return el;
}

function render(){
  const app=document.getElementById('app');app.innerHTML='';
  if(state.screen==='setup'){app.appendChild(renderSetup());return;}
  if(state.screen==='loading'||state.loading){app.appendChild(h('div',{className:'loading'},h('div',{className:'msg'},'Firebaseに接続中...'),h('div',{className:'sub'},'チームのタスクを取得しています')));return;}

  const hiddenDoneCount=state.tasks.filter(t=>isDoneHidden(t)).length;
  const filtered=state.tasks.filter(t=>{
    if(state.filterMember&&!taskHasAssignee(t,state.filterMember))return false;
    if(state.search&&!t.title.toLowerCase().includes(state.search.toLowerCase())&&!(t.desc||'').toLowerCase().includes(state.search.toLowerCase()))return false;
    if(!state.showDone&&t.status==='done')return false;
    if(state.showDone&&isDoneHidden(t))return false;
    return true;
  });
  const stats={total:state.tasks.length,done:state.tasks.filter(t=>t.status==='done').length,overdue:state.tasks.filter(t=>isOverdue(t.deadline)&&t.status!=='done').length,inProgress:state.tasks.filter(t=>t.status==='in_progress').length};

  const container=h('div',{className:'app'});
  const header=h('div',{className:'header'});
  const hl=h('div');hl.appendChild(h('h1',null,'タスクボード'));
  const sub=h('div',{className:'header-sub'});sub.appendChild(h('p',null,'チーム共有タスク管理'));
  const si=h('div',{className:'sync-info'});si.appendChild(h('span',{className:'sync-dot',style:{background:state.syncing?'#BA7517':'#1D9E75'}}));
  si.appendChild(document.createTextNode(state.lastSync?`同期済 ${new Date(state.lastSync).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}`:'リアルタイム同期中'));
  sub.appendChild(si);hl.appendChild(sub);header.appendChild(hl);
  const headerR=h('div',{style:{display:'flex',gap:'8px'}});
  headerR.appendChild(h('button',{onClick:()=>{localStorage.removeItem(STORAGE_KEY);location.reload();},style:{fontSize:'11px',color:'var(--text-tertiary)'}},'設定変更'));
  headerR.appendChild(h('button',{className:'primary',onClick:()=>setState({modal:{mode:'new'}})},'+ 新規タスク'));
  header.appendChild(headerR);container.appendChild(header);

  const sg=h('div',{className:'stats'});
  [{l:'合計',v:stats.total,bg:'var(--bg-secondary)'},{l:'進行中',v:stats.inProgress,bg:'#E6F1FB'},{l:'完了',v:stats.done,bg:'#E1F5EE'},{l:'期限超過',v:stats.overdue,bg:stats.overdue>0?'#FCEBEB':'var(--bg-secondary)'}].forEach(s=>{
    sg.appendChild(h('div',{className:'stat-card',style:{background:s.bg}},h('div',{className:'label'},s.l),h('div',{className:'value'},String(s.v))));
  });
  container.appendChild(sg);

  const tb=h('div',{className:'toolbar'});
  tb.appendChild(h('input',{placeholder:'検索...',value:state.search,onInput:e=>setState({search:e.target.value})}));
  const ms=h('select',{onChange:e=>setState({filterMember:e.target.value})});ms.appendChild(h('option',{value:''},'全メンバー'));
  state.members.forEach(m=>{const o=h('option',{value:m.id},m.name);if(m.id===state.filterMember)o.selected=true;ms.appendChild(o);});
  tb.appendChild(ms);
  const doneToggle=h('button',{style:{fontSize:'12px',padding:'5px 12px',background:state.showDone?'transparent':'var(--bg-tertiary)',color:state.showDone?'var(--text-secondary)':'var(--text-primary)'},onClick:()=>setState({showDone:!state.showDone})},state.showDone?'● 完了を非表示':'○ 完了を表示');
  tb.appendChild(doneToggle);
  if(hiddenDoneCount>0){tb.appendChild(h('span',{style:{fontSize:'11px',color:'var(--text-tertiary)'}},`(${hiddenDoneCount}件 3日超で自動非表示)`));}
  const vt=h('div',{className:'view-toggle'});
  [['kanban','ボード'],['list','リスト']].forEach(([k,l])=>vt.appendChild(h('button',{className:`view-btn ${state.view===k?'active':''}`,onClick:()=>setState({view:k})},l)));
  tb.appendChild(vt);container.appendChild(tb);

  container.appendChild(state.view==='kanban'?renderKanban(filtered):renderList(filtered));
  if(filtered.length===0)container.appendChild(h('div',{className:'empty-state'},'タスクが見つかりません'));

  const ms2=h('div',{className:'members-section'});
  const mt=h('div',{className:'section-title'});mt.appendChild(document.createTextNode('メンバー'));
  const mtBtns=h('div',{style:{display:'flex',gap:'6px'}});
  mtBtns.appendChild(h('button',{style:{fontSize:'11px',padding:'3px 10px'},onClick:()=>setState({modal:{mode:'members'}})},'編集'));
  mtBtns.appendChild(h('button',{style:{fontSize:'11px',padding:'3px 10px'},onClick:()=>saveTasks(sampleTasks(state.members))},'タスクリセット'));
  mt.appendChild(mtBtns);ms2.appendChild(mt);
  const mg=h('div',{className:'members-grid'});
  state.members.forEach(m=>{
    const c=state.tasks.filter(t=>taskHasAssignee(t,m.id)&&t.status!=='done').length;
    mg.appendChild(h('div',{className:`member-item ${state.filterMember&&state.filterMember!==m.id?'faded':''}`,onClick:()=>setState({filterMember:state.filterMember===m.id?'':m.id})},
      avatarEl(m,28),h('div',null,h('div',{className:'member-name'},m.name),h('div',{className:'member-count'},`${c}件 進行中`))));
  });
  ms2.appendChild(mg);container.appendChild(ms2);

  container.appendChild(h('div',{className:'info-bar'},'リアルタイム共有モード: Firebaseでチームメンバーと自動同期中です。タスクやメンバー名の変更は即座に全員に反映されます。'));
  app.appendChild(container);
  const modalEl=renderModal();if(modalEl)app.appendChild(modalEl);
}

function loadFirebaseSDK(callback){
  if(typeof firebase!=='undefined'){callback();return;}
  const s1=document.createElement('script');s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload=()=>{const s2=document.createElement('script');s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';s2.onload=callback;document.head.appendChild(s2);};
  document.head.appendChild(s1);
}

const savedConfig=loadConfig();
if(savedConfig){state.screen='loading';render();loadFirebaseSDK(()=>{if(!initFirebase(savedConfig)){localStorage.removeItem(STORAGE_KEY);setState({screen:'setup',loading:false});}});}
else{state.screen='setup';state.loading=false;render();}
</script>
</body>
</html>
